<svg width="920" height="620" viewBox="0 0 920 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Dot Grid -->
    <pattern id="dotGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#1E293B" opacity="0.4"/>
    </pattern>

    <!-- Highlight Gradients -->
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    
    <!-- Pulse Node Glow -->
    <radialGradient id="pulseGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <rect width="920" height="620" fill="url(#dotGrid)"/>

  <!-- ==================== STRUCTURAL CROSSHAIRS ==================== -->
  <g stroke="#94A3B8" stroke-width="1" opacity="0.15">
    <!-- Center Hub Anchor -->
    <path d="M 460 290 L 460 330 M 440 310 L 480 310"/>
    <!-- Quad Anchors -->
    <path d="M 260 140 L 260 160 M 250 150 L 270 150"/>
    <path d="M 260 460 L 260 480 M 250 470 L 270 470"/>
    <path d="M 660 140 L 660 160 M 650 150 L 670 150"/>
    <path d="M 660 460 L 660 480 M 650 470 L 670 470"/>
  </g>

  <!-- ==================== FAINT OFF-CANVAS EXTENSIONS ==================== -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.3">
    <!-- Top Left -->
    <line x1="0" y1="110" x2="80" y2="110"/>
    <line x1="0" y1="150" x2="120" y2="150"/>
    <line x1="0" y1="190" x2="160" y2="190"/>
    <!-- Bottom Left -->
    <line x1="0" y1="430" x2="160" y2="430"/>
    <line x1="0" y1="470" x2="120" y2="470"/>
    <line x1="0" y1="510" x2="80" y2="510"/>
    <!-- Top Right -->
    <line x1="840" y1="110" x2="920" y2="110"/>
    <line x1="800" y1="150" x2="920" y2="150"/>
    <line x1="760" y1="190" x2="920" y2="190"/>
    <!-- Bottom Right -->
    <line x1="760" y1="430" x2="920" y2="430"/>
    <line x1="800" y1="470" x2="920" y2="470"/>
    <line x1="840" y1="510" x2="920" y2="510"/>
  </g>

  <!-- ==================== ROUTING BUSES (VERTICAL) ==================== -->
  <g stroke="#1E293B" stroke-width="1.5" stroke-dasharray="2 4" opacity="0.6">
    <!-- Left Input Bus 1 -->
    <line x1="200" y1="110" x2="200" y2="190"/>
    <line x1="200" y1="430" x2="200" y2="510"/>
    <!-- Right Output Bus 1 -->
    <line x1="720" y1="110" x2="720" y2="190"/>
    <line x1="720" y1="430" x2="720" y2="510"/>
  </g>

  <!-- ==================== MAIN ROUTING TRACKS ==================== -->
  <g fill="none" stroke="#1E293B" stroke-width="1.5">
    
    <!-- TOP LEFT GROUP -->
    <path d="M 80 110 L 260 110 Q 300 110 300 150 L 300 230 Q 300 270 340 270 L 420 270"/>
    <path d="M 120 150 L 220 150 Q 260 150 260 190 L 260 250 Q 260 290 300 290 L 420 290"/>
    <path d="M 160 190 L 180 190 Q 220 190 220 230 L 220 270 Q 220 310 260 310 L 420 310"/>

    <!-- BOTTOM LEFT GROUP -->
    <path d="M 160 430 L 180 430 Q 220 430 220 390 L 220 370 Q 220 330 260 330 L 420 330"/>
    <path d="M 120 470 L 220 470 Q 260 470 260 430 L 260 390 Q 260 350 300 350 L 420 350"/>
    <path d="M 80 510 L 260 510 Q 300 510 300 470 L 300 410 Q 300 370 340 370 L 420 370"/>

    <!-- TOP RIGHT GROUP -->
    <path d="M 500 270 L 580 270 Q 620 270 620 230 L 620 150 Q 620 110 660 110 L 840 110"/>
    <path d="M 500 290 L 620 290 Q 660 290 660 250 L 660 190 Q 660 150 700 150 L 800 150"/>
    <path d="M 500 310 L 660 310 Q 700 310 700 270 L 700 230 Q 700 190 740 190 L 760 190"/>

    <!-- BOTTOM RIGHT GROUP -->
    <path d="M 500 330 L 660 330 Q 700 330 700 370 L 700 390 Q 700 430 740 430 L 760 430"/>
    <path d="M 500 350 L 620 350 Q 660 350 660 390 L 660 430 Q 660 470 700 470 L 800 470"/>
    <path d="M 500 370 L 580 370 Q 620 370 620 410 L 620 470 Q 620 510 660 510 L 840 510"/>

    <!-- CENTRAL PASS-THROUGHS -->
    <g stroke-width="1" opacity="0.4">
      <line x1="420" y1="270" x2="500" y2="270"/>
      <line x1="420" y1="290" x2="500" y2="290"/>
      <line x1="420" y1="310" x2="500" y2="310"/>
      <line x1="420" y1="330" x2="500" y2="330"/>
      <line x1="420" y1="350" x2="500" y2="350"/>
    </g>
  </g>

  <!-- ==================== SECONDARY TECH DETAILS (PCB HASH MARKS) ==================== -->
  <g stroke="#1E293B" stroke-width="1.5">
    <path d="M 140 107 L 140 113 M 146 107 L 146 113 M 152 107 L 152 113"/>
    <path d="M 780 107 L 780 113 M 786 107 L 786 113 M 792 107 L 792 113"/>
    <path d="M 140 507 L 140 513 M 146 507 L 146 513 M 152 507 L 152 513"/>
    <path d="M 780 507 L 780 513 M 786 507 L 786 513 M 792 507 L 792 513"/>
  </g>

  <!-- ==================== ACTIVE DATA HIGHLIGHTS ==================== -->
  <!-- Glowing back-strokes -->
  <g fill="none" stroke="#3B82F6" stroke-width="4" opacity="0.15" stroke-linecap="round">
    <path d="M 80 110 L 260 110 Q 300 110 300 150 L 300 180"/>
    <path d="M 500 290 L 620 290 Q 660 290 660 250 L 660 210"/>
    <line x1="420" y1="310" x2="500" y2="310"/>
  </g>

  <!-- Crisp core highlights -->
  <g fill="none" stroke="url(#blueAccent)" stroke-width="2" stroke-linecap="round">
    <!-- Top Left Active Signal -->
    <path d="M 80 110 L 260 110 Q 300 110 300 150 L 300 180"/>
    
    <!-- Bottom Left Active Signal -->
    <path d="M 260 420 L 260 390 Q 260 350 300 350 L 370 350"/>

    <!-- Top Right Active Signal -->
    <path d="M 500 290 L 620 290 Q 660 290 660 250 L 660 210"/>

    <!-- Bottom Right Active Signal -->
    <path d="M 620 440 L 620 470 Q 620 510 660 510 L 780 510"/>

    <!-- Central Signal Pass -->
    <line x1="430" y1="310" x2="490" y2="310"/>
  </g>

  <!-- Highlight Leading Edge Dots -->
  <g fill="#E2E8F0">
    <circle cx="300" cy="180" r="2.5"/>
    <circle cx="370" cy="350" r="2.5"/>
    <circle cx="660" cy="210" r="2.5"/>
    <circle cx="780" cy="510" r="2.5"/>
    <circle cx="490" cy="310" r="2.5"/>
  </g>

  <!-- ==================== HARDWARE INSET PILLS ==================== -->
  <g fill="#0F172A" stroke="#1E293B" stroke-width="1.5">
    <!-- Left Insets -->
    <rect x="330" y="266" width="20" height="8" rx="4"/>
    <rect x="370" y="286" width="20" height="8" rx="4"/>
    <rect x="370" y="346" width="20" height="8" rx="4"/>
    <!-- Right Insets -->
    <rect x="530" y="286" width="20" height="8" rx="4"/>
    <rect x="530" y="346" width="20" height="8" rx="4"/>
    <rect x="570" y="366" width="20" height="8" rx="4"/>
  </g>

  <!-- Highlight Pill Edges -->
  <path d="M 345 270 A 2 2 0 0 1 345 266" stroke="#3B82F6" stroke-width="1.5" fill="none" opacity="0.8"/>
  <path d="M 545 290 A 2 2 0 0 1 545 286" stroke="#3B82F6" stroke-width="1.5" fill="none" opacity="0.8"/>

  <!-- ==================== TERMINAL DOTS AND INTERSECTIONS ==================== -->
  <g fill="#0F172A" stroke="#1E293B" stroke-width="1.5">
    <!-- Entry / Exit Terminals -->
    <circle cx="80" cy="110" r="3.5"/><circle cx="120" cy="150" r="3.5"/><circle cx="160" cy="190" r="3.5"/>
    <circle cx="160" cy="430" r="3.5"/><circle cx="120" cy="470" r="3.5"/><circle cx="80" cy="510" r="3.5"/>
    
    <circle cx="840" cy="110" r="3.5"/><circle cx="800" cy="150" r="3.5"/><circle cx="760" cy="190" r="3.5"/>
    <circle cx="760" cy="430" r="3.5"/><circle cx="800" cy="470" r="3.5"/><circle cx="840" cy="510" r="3.5"/>
    
    <!-- Central Interface Nodes (Left) -->
    <circle cx="420" cy="270" r="3"/><circle cx="420" cy="290" r="3"/><circle cx="420" cy="310" r="3"/>
    <circle cx="420" cy="330" r="3"/><circle cx="420" cy="350" r="3"/>
    
    <!-- Central Interface Nodes (Right) -->
    <circle cx="500" cy="270" r="3"/><circle cx="500" cy="290" r="3"/><circle cx="500" cy="310" r="3"/>
    <circle cx="500" cy="330" r="3"/><circle cx="500" cy="350" r="3"/>
  </g>

  <!-- Accent Inner Dots -->
  <g fill="#3B82F6">
    <circle cx="80" cy="110" r="1.5"/>
    <circle cx="500" cy="290" r="1.5"/>
    <circle cx="420" cy="310" r="1.5"/>
    <circle cx="840" cy="510" r="1.5"/>
  </g>

  <g fill="#94A3B8" opacity="0.6">
    <!-- Bus Intersections -->
    <circle cx="200" cy="150" r="1.5"/><circle cx="200" cy="470" r="1.5"/>
    <circle cx="720" cy="150" r="1.5"/><circle cx="720" cy="470" r="1.5"/>
  </g>

  <!-- ==================== CENTRAL HUB (THE ROUTING CORE) ==================== -->
  <g>
    <!-- Ambient Core Glow -->
    <circle cx="460" cy="310" r="60" fill="url(#pulseGlow)" opacity="0.5"/>
    
    <!-- Concentric Rings -->
    <circle cx="460" cy="310" r="45" fill="none" stroke="#1E293B" stroke-width="1"/>
    <circle cx="460" cy="310" r="35" fill="none" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4 6" opacity="0.5"/>
    <circle cx="460" cy="310" r="25" fill="#0F172A" stroke="#1E293B" stroke-width="1.5"/>
    <circle cx="460" cy="310" r="10" fill="#111827" stroke="#60A5FA" stroke-width="1"/>
    <circle cx="460" cy="310" r="3" fill="#E2E8F0"/>
    
    <!-- Core Brackets -->
    <path d="M 405 250 L 395 250 L 395 370 L 405 370" fill="none" stroke="#60A5FA" stroke-width="1.5" opacity="0.7"/>
    <path d="M 515 250 L 525 250 L 525 370 L 515 370" fill="none" stroke="#94A3B8" stroke-width="1.5" opacity="0.4"/>
  </g>

</svg>
