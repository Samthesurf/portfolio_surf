<svg width="320" height="220" viewBox="0 0 320 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Outer bezel gradient for metallic edge -->
    <linearGradient id="bezelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8" stop-opacity="0.4"/>
      <stop offset="20%" stop-color="#1E293B" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#1E293B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#94A3B8" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Screen glare for glassmorphism effect -->
    <linearGradient id="glareGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0" stop-opacity="0.06"/>
      <stop offset="40%" stop-color="#E2E8F0" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#E2E8F0" stop-opacity="0"/>
    </linearGradient>

    <!-- Glass card background for top UI block -->
    <linearGradient id="glassBlock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Glass card subtle border -->
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1E293B" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>

    <clipPath id="screenClip">
      <rect x="109" y="24" width="102" height="172" rx="16"/>
    </clipPath>
  </defs>

  <!-- Hardware Buttons -->
  <!-- Left side (Volume/Mute) -->
  <rect x="103" y="50" width="2" height="10" rx="1" fill="#1E293B"/>
  <rect x="103" y="70" width="2" height="20" rx="1" fill="#1E293B"/>
  <rect x="103" y="95" width="2" height="20" rx="1" fill="#1E293B"/>
  <!-- Right side (Power) -->
  <rect x="215" y="75" width="2" height="25" rx="1" fill="#1E293B"/>

  <!-- Phone Bezel -->
  <rect x="105" y="20" width="110" height="180" rx="20" fill="#111827" stroke="url(#bezelGrad)" stroke-width="1.5"/>
  <!-- Inner metallic rim highlight -->
  <rect x="106" y="21" width="108" height="178" rx="19" fill="none" stroke="#E2E8F0" stroke-width="0.5" opacity="0.15"/>

  <!-- Inset Screen Base -->
  <rect x="109" y="24" width="102" height="172" rx="16" fill="#0F172A"/>

  <!-- Screen Glare / Reflection -->
  <polygon points="109,24 175,24 109,110" fill="url(#glareGrad)" clip-path="url(#screenClip)"/>

  <!-- Screen Depth Border -->
  <rect x="109" y="24" width="102" height="172" rx="16" fill="none" stroke="#1E293B" stroke-width="1" opacity="0.6"/>

  <!-- Subtle Section Dividers -->
  <line x1="109" y1="94" x2="211" y2="94" stroke="#1E293B" stroke-width="0.5" opacity="0.4"/>
  <line x1="109" y1="130" x2="211" y2="130" stroke="#1E293B" stroke-width="0.5" opacity="0.4"/>

  <!-- Dynamic Island / Top Notch -->
  <rect x="142" y="30" width="36" height="8" rx="4" fill="#111827" stroke="#1E293B" stroke-width="0.5"/>
  <circle cx="148" cy="34" r="2" fill="#0F172A"/>
  <circle cx="172" cy="34" r="1" fill="#0F172A"/>

  <!-- UI Block 1: Header / Hero Card -->
  <g transform="translate(0, 2)">
    <rect x="117" y="44" width="86" height="40" rx="8" fill="url(#glassBlock)" stroke="url(#glassBorder)" stroke-width="1"/>
    <!-- Blue Accent Icon Box -->
    <rect x="125" y="52" width="24" height="24" rx="6" fill="url(#blueAccent)"/>
    <!-- Icon Checkmark -->
    <path d="M132 64l3 3 4-4" stroke="#E2E8F0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Placeholder Lines -->
    <rect x="157" y="56" width="34" height="4" rx="2" fill="#E2E8F0"/>
    <rect x="157" y="66" width="20" height="4" rx="2" fill="#94A3B8"/>
  </g>

  <!-- UI Block 2: Content Item -->
  <rect x="117" y="100" width="86" height="24" rx="6" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <circle cx="129" cy="112" r="5" fill="#1E293B"/>
  <rect x="141" y="107" width="46" height="3" rx="1.5" fill="#94A3B8" opacity="0.9"/>
  <rect x="141" y="115" width="24" height="3" rx="1.5" fill="#94A3B8" opacity="0.4"/>

  <!-- UI Block 3: Content Item -->
  <rect x="117" y="136" width="86" height="24" rx="6" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <circle cx="129" cy="148" r="5" fill="#1E293B"/>
  <rect x="141" y="143" width="38" height="3" rx="1.5" fill="#94A3B8" opacity="0.9"/>
  <rect x="141" y="151" width="28" height="3" rx="1.5" fill="#94A3B8" opacity="0.4"/>

  <!-- Floating Action Button (FAB) -->
  <!-- Dark backing to cutout the lines underneath -->
  <circle cx="190" cy="160" r="13" fill="#0F172A"/>
  <!-- Blue FAB -->
  <circle cx="190" cy="160" r="12" fill="url(#blueAccent)"/>
  <!-- FAB Plus Icon -->
  <path d="M190 155v10M185 160h10" stroke="#E2E8F0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Bottom Navigation Bar -->
  <rect x="127" y="176" width="66" height="14" rx="7" fill="#1E293B" opacity="0.95"/>
  <!-- Active Tab Dot -->
  <circle cx="144" cy="183" r="2.5" fill="#60A5FA"/>
  <!-- Inactive Tab Dots -->
  <circle cx="160" cy="183" r="2" fill="#94A3B8" opacity="0.4"/>
  <circle cx="176" cy="183" r="2" fill="#94A3B8" opacity="0.4"/>

</svg>
