<svg width="320" height="220" viewBox="0 0 320 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Window outer bezel gradient -->
    <linearGradient id="windowBezel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8" stop-opacity="0.4"/>
      <stop offset="30%" stop-color="#1E293B" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#1E293B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#94A3B8" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Glass card overlay background -->
    <linearGradient id="glassCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Subtle screen glare -->
    <linearGradient id="windowGlare" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#E2E8F0" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#E2E8F0" stop-opacity="0"/>
    </linearGradient>

    <!-- Blue accent gradient -->
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>

    <clipPath id="windowClip">
      <rect x="30" y="30" width="260" height="160" rx="12"/>
    </clipPath>
  </defs>

  <!-- Desktop Window Base -->
  <rect x="30" y="30" width="260" height="160" rx="12" fill="#0F172A" stroke="url(#windowBezel)" stroke-width="1.5"/>
  
  <!-- Inner rim highlight -->
  <rect x="31" y="31" width="258" height="158" rx="11" fill="none" stroke="#E2E8F0" stroke-width="0.5" opacity="0.15"/>

  <!-- Screen Glare Polygon -->
  <polygon points="30,30 190,30 30,150" fill="url(#windowGlare)" clip-path="url(#windowClip)"/>

  <!-- Window Header -->
  <rect x="30" y="30" width="260" height="24" fill="#111827" clip-path="url(#windowClip)"/>
  <line x1="30" y1="54" x2="290" y2="54" stroke="#1E293B" stroke-width="1"/>
  
  <!-- Window Controls -->
  <circle cx="48" cy="42" r="3.5" fill="#3B82F6"/>
  <circle cx="60" cy="42" r="3.5" fill="#1E293B"/>
  <circle cx="72" cy="42" r="3.5" fill="#1E293B"/>

  <!-- Sidebar Area -->
  <rect x="30" y="55" width="60" height="135" fill="#111827" clip-path="url(#windowClip)"/>
  <line x1="90" y1="54" x2="90" y2="190" stroke="#1E293B" stroke-width="1"/>

  <!-- Sidebar Navigation Elements -->
  <!-- Active State -->
  <rect x="36" y="66" width="48" height="16" rx="4" fill="#1E293B" opacity="0.4"/>
  <rect x="36" y="70" width="2" height="8" rx="1" fill="#60A5FA"/>
  
  <rect x="44" y="72" width="26" height="4" rx="2" fill="#E2E8F0" opacity="0.9"/>
  <rect x="40" y="92" width="34" height="4" rx="2" fill="#94A3B8" opacity="0.4"/>
  <rect x="40" y="108" width="24" height="4" rx="2" fill="#94A3B8" opacity="0.4"/>
  <rect x="40" y="124" width="28" height="4" rx="2" fill="#94A3B8" opacity="0.4"/>

  <!-- Main Content Area: Geometric Code Blocks -->
  <!-- Line 1 -->
  <rect x="106" y="72" width="24" height="4" rx="2" fill="#60A5FA"/>
  <rect x="134" y="72" width="36" height="4" rx="2" fill="#94A3B8" opacity="0.5"/>
  
  <!-- Line 2 -->
  <rect x="120" y="86" width="28" height="4" rx="2" fill="#E2E8F0" opacity="0.8"/>
  <rect x="152" y="86" width="20" height="4" rx="2" fill="#94A3B8" opacity="0.4"/>
  
  <!-- Line 3 -->
  <rect x="120" y="100" width="16" height="4" rx="2" fill="#E2E8F0" opacity="0.8"/>
  <rect x="140" y="100" width="42" height="4" rx="2" fill="#3B82F6"/>
  
  <!-- Line 4 -->
  <rect x="134" y="114" width="32" height="4" rx="2" fill="#94A3B8" opacity="0.5"/>
  <rect x="170" y="114" width="14" height="4" rx="2" fill="#60A5FA"/>
  
  <!-- Line 5 -->
  <rect x="120" y="128" width="24" height="4" rx="2" fill="#E2E8F0" opacity="0.8"/>

  <!-- Floating Glassmorphic Component (Data / Analytics Preview) -->
  <g transform="translate(160, 95)">
    <!-- Glass Background & Depth -->
    <rect x="0" y="0" width="116" height="76" rx="8" fill="url(#glassCard)" stroke="#94A3B8" stroke-opacity="0.25" stroke-width="1"/>
    
    <!-- Component Header -->
    <rect x="12" y="12" width="16" height="16" rx="4" fill="url(#blueAccent)"/>
    <!-- Subtle Icon inside Header -->
    <circle cx="20" cy="20" r="3" fill="#0F172A"/>
    
    <!-- Component Title / Subtitle -->
    <rect x="36" y="14" width="36" height="4" rx="2" fill="#E2E8F0"/>
    <rect x="36" y="22" width="20" height="4" rx="2" fill="#94A3B8" opacity="0.6"/>

    <!-- Micro Bar Chart -->
    <line x1="12" y1="58" x2="104" y2="58" stroke="#1E293B" stroke-width="1"/>
    
    <!-- Bars -->
    <rect x="16" y="44" width="8" height="14" rx="2" fill="#3B82F6"/>
    <rect x="30" y="32" width="8" height="26" rx="2" fill="#60A5FA"/>
    <rect x="44" y="50" width="8" height="8" rx="2" fill="#1E293B"/>
    <rect x="58" y="24" width="8" height="34" rx="2" fill="#3B82F6"/>
    <rect x="72" y="38" width="8" height="20" rx="2" fill="#1E293B"/>
    <rect x="86" y="46" width="8" height="12" rx="2" fill="#60A5FA"/>
  </g>
</svg>